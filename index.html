<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水果消消乐</title>
    <link rel="stylesheet" href="src/styles.css">
    <style>
        /* 临时样式补充 */
        .message-popup {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            z-index: 1000;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 菜单界面 -->
        <div id="menu-screen" class="screen active">
            <h1>🍊 水果消消乐 🍊</h1>
            <div class="menu-buttons">
                <button id="start-btn" class="btn btn-primary">开始游戏</button>
                <button id="challenge-btn" class="btn btn-secondary">挑战模式</button>
                <button id="settings-btn" class="btn btn-secondary">设置</button>
                <button id="leaderboard-btn" class="btn btn-secondary">排行档</button>
            </div>
        </div>

        <!-- 游戏主界面 -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="score-board">
                    <div class="score-item">
                        <span class="label">关卡:</span>
                        <span id="level" class="value">1</span>
                    </div>
                    <div class="score-item">
                        <span class="label">分数:</span>
                        <span id="score" class="value">0</span>
                    </div>
                    <div class="score-item">
                        <span class="label">目标:</span>
                        <span id="target" class="value">1000</span>
                    </div>
                    <div class="score-item">
                        <span class="label">时间:</span>
                        <span id="timer" class="value">60</span>
                    </div>
                    <div class="score-item">
                        <span class="label">连锁:</span>
                        <span id="combo" class="value">0</span>
                    </div>
                </div>
                <button id="pause-btn" class="btn btn-small">暂停</button>
            </div>

            <div id="game-board" class="game-board"></div>

            <div class="power-ups">
                <button id="bomb-btn" class="power-up-btn" data-power="bomb">
                    🔥 <span class="count">3</span>
                </button>
                <button id="lightning-btn" class="power-up-btn" data-power="lightning">
                    ⚡️ <span class="count">2</span>
                </button>
                <button id="shuffle-btn" class="power-up-btn" data-power="shuffle">
                    🎉 <span class="count">1</span>
                </button>
            </div>
        </div>

        <!-- 游戏结束界面 -->
        <div id="game-over-screen" class="screen">
            <h2 id="game-result">游戏结束</h2>
            <div class="final-stats">
                <div class="stat-item">
                    <span class="label">最终分数:</span>
                    <span id="final-score" class="value">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">最高连锁:</span>
                    <span id="max-combo" class="value">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">权重:</span>
                    <span id="rating" class="value">未达标</span>
                </div>
            </div>
            <div class="game-over-buttons">
                <button id="restart-btn" class="btn btn-primary">重新开始</button>
                <button id="menu-btn" class="btn btn-secondary">返回菜单</button>
            </div>
        </div>

        <!-- 暂停界面 -->
        <div id="pause-screen" class="screen">
            <h2>游戏已暂停</h2>
            <div class="pause-buttons">
                <button id="resume-btn" class="btn btn-primary">继续游戏</button>
                <button id="restart-pause-btn" class="btn btn-secondary">重新开始</button>
                <button id="menu-pause-btn" class="btn btn-secondary">返回菜单</button>
            </div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
    <script>
        // 临时事件绑定，确保可用
        document.addEventListener('DOMContentLoaded', function() {
            const startBtn = document.getElementById('start-btn');
            const challengeBtn = document.getElementById('challenge-btn');
            
            if (startBtn) {
                startBtn.addEventListener('click', function() {
                    // 切换到游戏界面
                    document.getElementById('menu-screen').classList.remove('active');
                    document.getElementById('game-screen').classList.add('active');
                    
                    // 初始化游戏
                    setTimeout(initSimpleGame, 100);
                });
            }
            
            if (challengeBtn) {
                challengeBtn.addEventListener('click', function() {
                    // 切换到游戏界面
                    document.getElementById('menu-screen').classList.remove('active');
                    document.getElementById('game-screen').classList.add('active');
                    
                    // 初始化游戏
                    setTimeout(initChallengeGame, 100);
                });
            }
        });
        
        function initSimpleGame() {
            // 简单模式游戏初始化
            const game = {
                grid: [],
                score: 0,
                level: 1,
                timeLeft: 120,
                gameOver: false,
                mode: 'simple'
            };
            
            // 初始化网格
            initGrid(game);
            renderBoard(game);
            updateUI(game);
        }
        
        function initChallengeGame() {
            // 挑战模式游戏初始化
            const game = {
                grid: [],
                score: 0,
                level: 1,
                timeLeft: 120,
                gameOver: false,
                mode: 'challenge'
            };
            
            // 初始化网格
            initGrid(game);
            renderBoard(game);
            updateUI(game);
            startTimer(game);
        }
        
        function initGrid(game) {
            const fruitTypes = ['apple', 'banana', 'orange', 'grape', 'strawberry', 'watermelon', 'cherry'];
            
            for (let row = 0; row < 8; row++) {
                game.grid[row] = [];
                for (let col = 0; col < 8; col++) {
                    game.grid[row][col] = fruitTypes[Math.floor(Math.random() * fruitTypes.length)];
                }
            }
        }
        
        function renderBoard(game) {
            const gameBoard = document.getElementById('game-board');
            if (!gameBoard) return;
            
            gameBoard.innerHTML = '';
            
            for (let row = 0; row < game.grid.length; row++) {
                for (let col = 0; col < game.grid[row].length; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;

                    const fruit = game.grid[row][col];
                    if (fruit) {
                        const fruitElement = document.createElement('div');
                        fruitElement.className = 'fruit';
                        
                        // 使用图片替代emoji
                        const img = document.createElement('img');
                        img.src = getFruitImage(fruit);
                        img.className = 'fruit-image';
                        img.alt = getFruitName(fruit);
                        
                        fruitElement.appendChild(img);
                        cell.appendChild(fruitElement);
                    }

                    gameBoard.appendChild(cell);
                }
            }
        }
        
        function getFruitImage(fruitType) {
            const fruitImages = {
                'apple': './pic/apple.png',
                'banana': './pic/banana.png',
                'orange': './pic/orange.png',
                'grape': './pic/grape.png',
                'strawberry': './pic/strawberry.png',
                'watermelon': './pic/watermelon.png',
                'cherry': './pic/cherry.png'
            };
            return fruitImages[fruitType] || './pic/apple.png';
        }
        
        function getFruitName(fruitType) {
            const fruitNames = {
                'apple': '苹果',
                'banana': '香蕉',
                'orange': '橙子',
                'grape': '葡萄',
                'strawberry': '荆葱',
                'watermelon': '西瓜',
                'cherry': '樱桃'
            };
            return fruitNames[fruitType] || fruitType;
        }
        
        function updateUI(game) {
            document.getElementById('score').textContent = game.score;
            document.getElementById('timer').textContent = Math.ceil(game.timeLeft);
            document.getElementById('level').textContent = game.level;
        }
        
        function startTimer(game) {
            setInterval(() => {
                if (!game.gameOver && game.mode === 'challenge') {
                    game.timeLeft--;
                    updateUI(game);
                    
                    if (game.timeLeft <= 0) {
                        game.gameOver = true;
                        alert('时间到！');
                    }
                }
            }, 1000);
        }
    </script>
</body>
</html>
